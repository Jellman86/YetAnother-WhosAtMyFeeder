name: Docs Quality
run-name: "${{ github.ref_name }}: ${{ github.event.head_commit.message || github.event_name }}"

on:
  push:
    branches: [dev, main]
    paths:
      - "README.md"
      - "MIGRATION.md"
      - "docs/**"
      - "backend/app/main.py"
      - "backend/app/routers/**"
      - "backend/scripts/docs_consistency_check.py"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    paths:
      - "README.md"
      - "MIGRATION.md"
      - "docs/**"
      - "backend/app/main.py"
      - "backend/app/routers/**"
      - "backend/scripts/docs_consistency_check.py"
      - ".github/workflows/docs-quality.yml"

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run documentation consistency checks
        run: |
          python3 backend/scripts/docs_consistency_check.py
