name: Build and Push Docker Images
run-name: "${{ github.ref_name }}: ${{ github.event.head_commit.message || github.event_name }}"

on:
  push:
    branches: [dev]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.compute.outputs.backend }}
      frontend: ${{ steps.compute.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine publish scope
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          # Always build both images together so frontend/backend dev tags
          # share the same git hash and are safe to deploy as one versioned pair.
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"

  test-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Migration smoke test (fresh DB)
        run: |
          cd backend
          export DB_PATH=/tmp/ci-speciesid.db
          rm -f "$DB_PATH"
          python -m alembic upgrade head

      - name: Migration idempotency check
        run: |
          cd backend
          export DB_PATH=/tmp/ci-speciesid.db
          python -m alembic upgrade head

      - name: Migration downgrade/upgrade check
        run: |
          cd backend
          export DB_PATH=/tmp/ci-speciesid.db
          python -m alembic downgrade -1
          python -m alembic upgrade head

      - name: Migration upgrade path matrix (sampled revisions)
        run: |
          cd backend
          python scripts/ci_migration_path_check.py

      - name: SQLite schema sanity checks (FKs + integrity)
        run: |
          cd backend
          export DB_PATH=/tmp/ci-speciesid.db
          python - <<'PY'
          import sqlite3
          import sys
          import os

          db_path = os.environ["DB_PATH"]
          conn = sqlite3.connect(db_path)
          try:
            conn.execute("PRAGMA foreign_keys=ON;")

            # Basic health checks
            fk_enabled = conn.execute("PRAGMA foreign_keys;").fetchone()[0]
            if fk_enabled != 1:
              print("foreign_keys pragma is not enabled")
              sys.exit(1)

            integrity = conn.execute("PRAGMA integrity_check;").fetchone()[0]
            if integrity != "ok":
              print("integrity_check failed:", integrity)
              sys.exit(1)

            # Detect FK violations (also catches many bad constraints)
            fk_violations = conn.execute("PRAGMA foreign_key_check;").fetchall()
            if fk_violations:
              print("foreign_key_check violations:", fk_violations[:20])
              sys.exit(1)

            # Regression guard: taxonomy_translations must NOT have an FK to taxonomy_cache.taxa_id
            # (it caused sqlite3.OperationalError: foreign key mismatch on upgraded DBs).
            fk_list = conn.execute("PRAGMA foreign_key_list(taxonomy_translations);").fetchall()
            if fk_list:
              print("taxonomy_translations has unexpected foreign keys:", fk_list)
              sys.exit(1)

            # Smoke-write: this would have thrown OperationalError with the old FK mismatch.
            conn.execute(
              "INSERT OR REPLACE INTO taxonomy_translations (taxa_id, language_code, common_name) VALUES (?, ?, ?)",
              (123456, "ru", "test-name"),
            )
            conn.commit()
          finally:
            conn.close()
          print("SQLite sanity checks OK:", db_path)
          PY

      - name: Backend startup/shutdown smoke test
        run: |
          cd backend
          timeout 180s python - <<'PY'
          import asyncio
          import os
          import tempfile
          from pathlib import Path

          import httpx

          temp_dir = tempfile.mkdtemp(prefix="yawamf_ci_startup_")
          os.environ["MEDIA_CACHE_DIR"] = str(Path(temp_dir) / "media_cache")
          os.environ["DATA_DIR"] = str(Path(temp_dir) / "data")
          os.environ["CONFIG_DIR"] = str(Path(temp_dir) / "config")
          os.environ["CONFIG_FILE"] = str(Path(temp_dir) / "config" / "config.json")
          os.environ["DB_PATH"] = str(Path(temp_dir) / "speciesid.db")

          Path(os.environ["MEDIA_CACHE_DIR"]).mkdir(parents=True, exist_ok=True)
          Path(os.environ["DATA_DIR"]).mkdir(parents=True, exist_ok=True)
          Path(os.environ["CONFIG_DIR"]).mkdir(parents=True, exist_ok=True)

          from app.main import app, lifespan

          async def smoke():
              async with lifespan(app):
                  assert hasattr(app.state, "startup_warnings")
                  assert isinstance(app.state.startup_warnings, list)
                  transport = httpx.ASGITransport(app=app)
                  async with httpx.AsyncClient(transport=transport, base_url="http://test") as client:
                      health = await client.get("/health")
                      assert health.status_code == 200, health.text
                      ready = await client.get("/ready")
                      assert ready.status_code == 200, ready.text
                      body = ready.json()
                      assert body.get("ready") is True, body

          asyncio.run(smoke())
          print("Startup/shutdown smoke test OK")
          PY
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "Backend startup/shutdown smoke test timed out after 180s"
            exit 1
          fi
          exit $rc

      - name: Run tests
        run: |
          cd backend
          LOG_FILE=/tmp/backend-tests.log
          TEST_TIMEOUT_SECONDS=240
          HEARTBEAT_INTERVAL_SECONDS=30
          SUMMARY_GRACE_SECONDS=12
          MONITOR_INTERVAL_SECONDS=2
          : > "$LOG_FILE"
          set +e

          started_at=$(date +%s)
          (
            while true; do
              sleep "$HEARTBEAT_INTERVAL_SECONDS"
              now=$(date +%s)
              elapsed=$((now - started_at))
              echo "[backend-tests] still running (${elapsed}s elapsed)"
            done
          ) &
          heartbeat_pid=$!

          export LOG_FILE TEST_TIMEOUT_SECONDS
          RUNNER_SCRIPT=/tmp/run_backend_tests_ci.sh
          cat > "$RUNNER_SCRIPT" <<'SH'
          #!/usr/bin/env bash
          set -o pipefail
          timeout -k 30s "${TEST_TIMEOUT_SECONDS}s" bash -lc '
            python -m coverage erase &&
            python -m coverage run -m pytest tests/ -v --tb=short --durations=20 &&
            python -m coverage report --fail-under=20
          ' 2>&1 | tee "$LOG_FILE"
          SH
          chmod +x "$RUNNER_SCRIPT"

          # Run test pipeline in its own process group so we can terminate hung teardown quickly.
          setsid "$RUNNER_SCRIPT" &
          runner_pid=$!

          summary_state=""
          summary_seen_at=0

          while kill -0 "$runner_pid" >/dev/null 2>&1; do
            now=$(date +%s)
            summary_line=$(grep -E "^={6,}.*={6,}$" "$LOG_FILE" | tail -n 1 || true)
            if [ -z "$summary_state" ]; then
              if [ -n "$summary_line" ] && echo "$summary_line" | grep -Eq "([0-9]+ failed|[0-9]+ error|[0-9]+ errors)"; then
                summary_state="failed"
                summary_seen_at=$now
                echo "Detected pytest failure summary; allowing ${SUMMARY_GRACE_SECONDS}s for graceful teardown."
              elif [ -n "$summary_line" ] && echo "$summary_line" | grep -Eq "[0-9]+ passed"; then
                summary_state="passed"
                summary_seen_at=$now
                echo "Detected pytest pass summary; allowing ${SUMMARY_GRACE_SECONDS}s for graceful teardown."
              fi
            elif [ "$summary_state" = "passed" ] && [ -n "$summary_line" ] && echo "$summary_line" | grep -Eq "([0-9]+ failed|[0-9]+ error|[0-9]+ errors)"; then
              summary_state="failed"
              summary_seen_at=$now
              echo "Detected pytest failure markers after initial pass signal; switching to failure state."
            elif [ $((now - summary_seen_at)) -ge "$SUMMARY_GRACE_SECONDS" ]; then
              echo "Runner still active ${SUMMARY_GRACE_SECONDS}s after pytest ${summary_state} summary; terminating stuck teardown."
              kill -TERM -- "-$runner_pid" >/dev/null 2>&1 || true
              sleep 2
              kill -KILL -- "-$runner_pid" >/dev/null 2>&1 || true
              break
            fi
            sleep "$MONITOR_INTERVAL_SECONDS"
          done

          wait "$runner_pid"
          rc=$?

          kill "$heartbeat_pid" >/dev/null 2>&1 || true
          wait "$heartbeat_pid" 2>/dev/null || true
          rm -f "$RUNNER_SCRIPT"
          set -e

          # Known CI issue: process can hang after pytest printed final summary.
          # If pytest reported pass, always re-check coverage gate from saved data.
          if [ "$summary_state" = "passed" ]; then
            echo "Validating coverage gate after pytest pass summary."
            if python -m coverage report --fail-under=20; then
              echo "Coverage gate passed."
              exit 0
            fi
            echo "Coverage gate failed after pytest pass summary."
            exit 1
          fi

          if [ "$summary_state" = "failed" ]; then
            echo "Backend tests reported failures."
            echo "Last 200 log lines:"
            tail -n 200 "$LOG_FILE" || true
            exit 1
          fi

          if [ $rc -eq 124 ]; then
            echo "Backend pytest timed out after ${TEST_TIMEOUT_SECONDS}s."
            echo "Last 200 log lines:"
            tail -n 200 "$LOG_FILE" || true
            echo "Runner process snapshot:"
            ps -eo pid,ppid,stat,etime,cmd | head -n 120 || true
            exit 1
          fi
          exit $rc

      - name: Ensure single Alembic head
        run: |
          cd backend
          python - <<'PY'
          import sys
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          config = Config("alembic.ini")
          script = ScriptDirectory.from_config(config)
          heads = script.get_heads()
          if len(heads) != 1:
              print(f"Expected 1 Alembic head, found {len(heads)}: {heads}")
              sys.exit(1)
          print(f"Alembic head OK: {heads[0]}")
          PY

  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/ui
          npm ci

      - name: Svelte check
        run: |
          cd apps/ui
          npm run check

      - name: Frontend unit tests
        run: |
          cd apps/ui
          npm test

      - name: Build frontend
        run: |
          cd apps/ui
          npm run build

  build-backend:
    needs: [detect-changes, test-backend]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Prefer tag version for releases (strip leading 'v')
            echo "APP_VERSION_BASE=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          else
            echo "APP_VERSION_BASE=$(cat VERSION)" >> $GITHUB_ENV
          fi

      - name: Get branch and SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Avoid embedding tag name into APP_VERSION (it already encodes the version)
            echo "APP_BRANCH=main" >> $GITHUB_ENV
          else
            echo "APP_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: Determine image tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "PUBLISH_LATEST=true" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "PUBLISH_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          build-args: |
            GIT_HASH=${{ env.SHORT_SHA }}
            APP_VERSION_BASE=${{ env.APP_VERSION_BASE }}
            APP_BRANCH=${{ env.APP_BRANCH }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wamf-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/wamf-backend:${{ github.sha }}
      - name: Tag backend latest
        if: env.PUBLISH_LATEST == 'true'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/wamf-backend:latest \
            ghcr.io/${{ env.OWNER_LC }}/wamf-backend:${{ env.IMAGE_TAG }}

  build-frontend:
    needs: [detect-changes, test-frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Prefer tag version for releases (strip leading 'v')
            echo "APP_VERSION_BASE=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          else
            echo "APP_VERSION_BASE=$(cat VERSION)" >> $GITHUB_ENV
          fi

      - name: Get branch and SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Avoid embedding tag name into APP_VERSION (it already encodes the version)
            echo "APP_BRANCH=main" >> $GITHUB_ENV
          else
            echo "APP_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: Determine image tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "PUBLISH_LATEST=true" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "PUBLISH_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ui
          push: true
          build-args: |
            GIT_HASH=${{ env.SHORT_SHA }}
            APP_VERSION_BASE=${{ env.APP_VERSION_BASE }}
            APP_BRANCH=${{ env.APP_BRANCH }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wamf-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/wamf-frontend:${{ github.sha }}
      - name: Tag frontend latest
        if: env.PUBLISH_LATEST == 'true'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER_LC }}/wamf-frontend:latest \
            ghcr.io/${{ env.OWNER_LC }}/wamf-frontend:${{ env.IMAGE_TAG }}
