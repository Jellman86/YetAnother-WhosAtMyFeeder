name: YetAnother-WhosAtMyFeeder-Dev
#-----------------------------------------------
# Yet Another WhosAtMyFeeder - Development Environment
#
# This docker-compose file uses the 'dev' tagged images from GHCR
# Built automatically from the 'dev' branch via GitHub Actions
#
# Usage: docker compose -f docker-compose.dev.yml up -d
#-----------------------------------------------
services:
  yawamf-backend:
    image: ghcr.io/jellman86/wamf-backend:dev
    container_name: yawamf-backend-dev
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      - yawamf_network
    volumes:
      - ./config:/config        # Configuration files (config.json)
      - ./data:/data            # Persistent data (database, models)
    # Intel iGPU (OpenVINO) example:
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   # Use the host's /dev/dri group IDs (check with: ls -ln /dev/dri)
    #   - "44"   # video (example)
    #   - "107"  # render (example)
    # NVIDIA CUDA example (Docker Compose v2.20+):
    # gpus: all
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # If `gpus: all` is not supported by your host/compose plugin, use the
    # NVIDIA Container Toolkit runtime equivalent in your orchestrator.
    ports:
      - "8946:8000"
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - FRIGATE__FRIGATE_URL=${FRIGATE_URL:-http://frigate:5000}
      - FRIGATE__FRIGATE_AUTH_TOKEN=${FRIGATE_AUTH_TOKEN:-}
      - FRIGATE__MQTT_SERVER=${MQTT_SERVER:-mqtt}
      - FRIGATE__MQTT_PORT=${MQTT_PORT:-1883}
      - FRIGATE__MQTT_AUTH=${MQTT_AUTH:-false}
      - FRIGATE__MQTT_USERNAME=${MQTT_USERNAME:-}
      - FRIGATE__MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - SYSTEM__DEBUG_UI_ENABLED=${DEBUG_UI_ENABLED:-false}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  yawamf-frontend:
    image: ghcr.io/jellman86/wamf-frontend:dev
    container_name: yawamf-frontend-dev
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      - yawamf_network
    ports:
      - "9852:80"
    depends_on:
      - yawamf-backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  yawamf_network:
    name: ${DOCKER_NETWORK:-yawamf_default}
    external: true
